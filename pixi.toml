# Ruby + toolchain from conda-forge; gems from Gemfile via Bundler.
# Install Pixi: curl -fsSL https://pixi.sh/install.sh | sh   OR   wget -qO- https://pixi.sh/install.sh | sh

[workspace]
name = "eporetsky-site"
version = "0.1.0"
description = "Local Jekyll (Beautiful Jekyll theme + Gemfile)"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[dependencies]
ruby = ">=3.2,<3.5"
compilers = "*"
openssl = "*"
pkg-config = "*"
make = "*"

[target.osx-64.dependencies]
clang_osx-64 = "*"

[target.osx-arm64.dependencies]
clang_osx-arm64 = "*"

[target.linux-64.dependencies]
gcc_linux-64 = "*"

[tasks]
# Install Ruby gems (after clone or Gemfile change)
install = "bundle install"
# One-shot: install gems then serve with live reload
dev = "bundle install && bundle exec jekyll serve --livereload"
build = "bundle exec jekyll build"
serve = "bundle exec jekyll serve"
serve-livereload = "bundle exec jekyll serve --livereload"
