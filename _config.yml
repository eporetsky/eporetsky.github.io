# Beautiful Jekyll (remote theme) — https://github.com/daattali/beautiful-jekyll
remote_theme: daattali/beautiful-jekyll@6.0.1

title: Elly Poretsky, PhD
author: Elly Poretsky
description: >-
  Plant immunity, comparative genomics, protein modeling, and practical
  bioinformatics tutorials.

url: "https://eporetsky.github.io"
baseurl: ""

navbar-links:
  Home: "/"
  PlantApp: "plantapp/"
  Research:
    - Overview: "research/"
    - Current research: "research/current"
    - Past Research: "research/ucsd"
    - CV: "research/CV"
    - Citations: "research/citations"
  Analysis Tools:
    - Workflows: "analysis-tools/workflows"
    - MutRank: "analysis-tools/mutrank"
    - MutClust: "analysis-tools/mutclust"
    - MutAgg: "analysis-tools/mutagg"
    - NailScan: "analysis-tools/nailscan"
    - RobustGRN: "analysis-tools/robustgrn"
    - PyRRA: "analysis-tools/pyrra"
  Tutorials:
    - Protein annotation: "tutorials/annotation"
    - RNA-seq: "tutorials/rnaseq"
    - ChIP-seq: "tutorials/chipseq"
    - Nanopore: "tutorials/nanopore"
    - Protein-ligand: "tutorials/protein_ligand"
    - Coexpression: "tutorials/coexpression"
    - Protein language models: "tutorials/plm"
    - Comparative genomics: "tutorials/comparative"
    - Other: "tutorials/other"

social-network-links:
  github: eporetsky
  mastodon: genomic.social/@eporetsky
  linkedin: eporetsky
  google-scholar: citations?user=g0GnVFUAAAAJ

gtag: G-JW0N93QGY1

post_search: false
edit_page_button: true
title-on-all-pages: true

navbar-col: "#f3f1ec"
footer-col: "#eae8e3"
link-col: "#1e5f4a"
hover-col: "#0f3d32"

site-css:
  - "/assets/css/custom-styles.css"

permalink: /:year-:month-:day-:title/
paginate: 5
paginate_path: "/page:num"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

timezone: America/Los_Angeles
date_format: "%B %d, %Y"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      comments: false
      social-share: false
  - scope:
      path: ""
    values:
      layout: page

plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from

exclude:
  - Gemfile
  - Gemfile.lock
  - notes.txt
  - vendor
  - pixi.toml
  - pixi.lock
  - .pixi
  - README.md
